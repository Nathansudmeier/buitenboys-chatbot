<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.C. Buitenboys Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    min-height: 100vh;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 500px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    height: 600px;
    background: #fff;
  }

  .chat-header {
    background: #1b2d6b;
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .header-text { flex: 1; }
  .header-text .title { font-size: 15px; font-weight: 600; }
  .header-text .sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 1px; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; flex-direction: column; max-width: 82%; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
  }

  .msg.bot .bubble {
    background: #f0f2f7;
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: #1b2d6b;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 15px;
    background: #f0f2f7;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #999;
    animation: typing 1.3s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 8px 16px 12px;
    flex-shrink: 0;
    border-top: 1px solid #f0f0f0;
  }

  .qr-btn {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid #1b2d6b;
    background: transparent;
    color: #1b2d6b;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .qr-btn:hover {
    background: #1b2d6b;
    color: #fff;
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
    padding: 12px 16px 14px;
    border-top: 1px solid #eee;
    flex-shrink: 0;
    background: #fff;
  }

  .chat-input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 24px;
    border: 1.5px solid #ddd;
    background: #f8f9fb;
    color: #1a1a2e;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: #1b2d6b; background: #fff; }
  .chat-input::placeholder { color: #aaa; }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #1b2d6b;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; cursor: default; }

  .send-btn svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #bbb;
    padding-bottom: 6px;
  }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-logo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="14" fill="#1b2d6b"/>
        <text x="15" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="sans-serif">BB</text>
      </svg>
    </div>
    <div class="header-text">
      <div class="title">S.C. Buitenboys</div>
      <div class="sub">Stel je vraag, we helpen je verder</div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="msg bot">
      <div class="bubble">Hoi! Ik ben de digitale assistent van S.C. Buitenboys ⚽<br><br>Stel gerust je vraag over trainingstijden, lid worden, contributie of contact. Ik help je direct verder!</div>
      <div class="msg-time">Nu</div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('Hoe word ik lid van Buitenboys?')">Lid worden</button>
    <button class="qr-btn" onclick="sendQuick('Hoe laat zijn de trainingen?')">Trainingstijden</button>
    <button class="qr-btn" onclick="sendQuick('Wat kost het lidmaatschap?')">Contributie</button>
    <button class="qr-btn" onclick="sendQuick('Hoe kan ik contact opnemen?')">Contact</button>
    <button class="qr-btn" onclick="sendQuick('Hoe meld ik me aan als vrijwilliger?')">Vrijwilligers</button>
    <button class="qr-btn" onclick="sendQuick('Hoe kan ik sponsor worden van Buitenboys?')">Sponsor worden</button>
  </div>

  <div class="chat-input-row">
    <input class="chat-input" id="userInput" type="text" placeholder="Typ je vraag..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="footer-note">Aangedreven door AI · S.C. Buitenboys</div>
</div>

<script>
let history = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, sender) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const formatted = text.replace(/\n/g, '<br>');
  div.innerHTML = `<div class="bubble">${formatted}</div><div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(text) {
  if (isLoading || !text.trim()) return;
  isLoading = true;

  document.getElementById('quickReplies').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('userInput').value = '';

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Er ging iets mis. Probeer het opnieuw.';
    history.push({ role: 'assistant', content: reply });
    addMessage(reply, 'bot');

  } catch (e) {
    removeTyping();
    addMessage('Oeps, verbindingsprobleem. Probeer het opnieuw of neem contact op via info@buitenboys.nl', 'bot');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function handleSend() {
  sendMessage(document.getElementById('userInput').value.trim());
}

function sendQuick(text) {
  sendMessage(text);
}

const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();
    if (!e.shiftKey) handleSend();
  }
});
input.addEventListener('keypress', e => {
  if (e.key === 'Enter' || e.keyCode === 13) {
    e.preventDefault();
    e.stopPropagation();
  }
});
</script>
</body>
</html>
