CLUBFILOSOFIE & VOETBALVISIE:
Bij S.C. Buitenboys draait het om meer dan alleen winnen. We leiden spelers op in een herkenbare, aanvallende speelstijl met balbezit, dynamisch combinatiespel en hoge pressing als kernprincipes. Dit geldt van U8 tot de seniorenselecties. Het doel is doorstroom naar het eerste elftal.
Of je nu jongen of meisje bent, beginnend of gevorderd: iedereen krijgt gelijke ontwikkelkansen. Meisjes spelen zo lang mogelijk tussen of tegen jongens voor maximale uitdaging en groei.

VOETBALVISIE — HET DNA VAN BUITENBOYS:
Ons voetbal is herkenbaar, attractief en effectief. We spelen met lef en intelligentie.

Balbezit als wapen: balbezit is geen doel op zich, maar een middel om de wedstrijd naar onze hand te zetten. Met verzorgd positiespel en dynamische combinaties zoeken we openingen en houden we controle.

De kracht van samenwerking: korte, snelle passes, veel beweging zonder bal en slimme positiewisselingen. Iedere speler draagt bij, van keeper tot spits. Hoe vloeiender de combinaties, hoe moeilijker we te bespelen zijn.

Het middenveld als motor:
- 6 (verdedigende stabilisator): bewaakt de balans en start de opbouw
- 8 (box-to-box motor): verbindt en creëert door beweging
- 10 (creatieve schakel): zoekt tussen de linies en creëert kansen

De keeper als eerste opbouwer: meer dan een lijnverdediger. Hij is een extra veldspeler en de sleutel om onder druk uit te spelen.

Slim spelen met ruimte: breed spelen om de tegenstander uit elkaar te trekken, de diepte zoeken zodra er een opening is. Constante beweging creëert kansen.

Intensiteit en initiatief: compact, agressief en hoge druk bij balverlies. Bij balwinst direct omschakelen en de aanval zoeken.

Het DNA van Buitenboys:
- Balbezit als wapen
- Combinatiespel en creativiteit
- Hoog druk zetten
- Dynamische omschakelingen
- Meevoetballende keeper
- Compact verdedigen als collectief

Ontwikkeling: iedere speler krijgt ruimte om technisch, tactisch en mentaal te groeien. We trainen met een duidelijke speelstijl zodat talenten optimaal doorstromen, binnen de club of naar een hoger niveau. Dezelfde speelstijl loopt van jeugd tot senioren.

// CHAT LOGICA
// ============================================================
let history = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, sender) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  // Vervang newlines door <br>
  const formatted = text.replace(/\n/g, '<br>');
  div.innerHTML = `<div class="bubble">${formatted}</div><div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(text) {
  if (isLoading || !text.trim()) return;
  isLoading = true;

  document.getElementById('quickReplies').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('userInput').value = '';

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Er ging iets mis. Probeer het opnieuw.';
    history.push({ role: 'assistant', content: reply });
    addMessage(reply, 'bot');

  } catch (e) {
    removeTyping();
    addMessage('Oeps, verbindingsprobleem. Probeer het opnieuw of neem contact op via info@buitenboys.nl', 'bot');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function handleSend() {
  sendMessage(document.getElementById('userInput').value.trim());
}

function sendQuick(text) {
  sendMessage(text);
}

// Blokkeer Enter op alle niveaus zodat het CMS de pagina niet ververst
const input = document.getElementById('userInput');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();
    if (!e.shiftKey) handleSend();
  }
});

input.addEventListener('keypress', e => {
  if (e.key === 'Enter' || e.keyCode === 13) {
    e.preventDefault();
    e.stopPropagation();
  }
});

input.addEventListener('keyup', e => {
  if (e.key === 'Enter' || e.keyCode === 13) {
    e.preventDefault();
    e.stopPropagation();
  }
});

// Blokkeer elk formulier dat per ongeluk de chatbot omsluit
document.addEventListener('submit', e => {
  e.preventDefault();
  e.stopPropagation();
}, true);
</script>
</body>
</html>
